name: Build arm64-v8a APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-arm64-v8a-apk.yml"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "TMessagesProj/**"
      - "TMessagesProj_AppStandalone/**"

permissions:
  contents: read

concurrency:
  group: build-arm64-v8a-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-arm64-v8a-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: "12266719"

      - name: Install Android SDK components
        shell: bash
        run: |
          set +e
          yes 2>/dev/null | sdkmanager --licenses > /dev/null
          license_status=("${PIPESTATUS[@]}")
          set -e

          if [[ "${license_status[1]}" -ne 0 ]]; then
            echo "sdkmanager --licenses failed with exit code ${license_status[1]}"
            exit "${license_status[1]}"
          fi

          if [[ "${license_status[0]}" -ne 0 && "${license_status[0]}" -ne 1 && "${license_status[0]}" -ne 141 ]]; then
            echo "yes failed with unexpected exit code ${license_status[0]}"
            exit "${license_status[0]}"
          fi

          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;21.4.7075529" \
            "cmake;3.10.2.4988404"

      - name: Prepare local.properties
        shell: bash
        run: |
          cat > local.properties <<EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          EOF

      - name: Prepare CI placeholders
        shell: bash
        run: |
          cat > secrets_for_ci.env <<EOF
          SYSTEM_USERNAME=github-actions
          TELEGRAM_CHAT_ID=0
          TELEGRAM_BOT_TOKEN=dummy
          EOF

          keytool -genkeypair \
            -v \
            -keystore Your_Key.jks \
            -storepass Your_Password \
            -alias Your_Alias \
            -keypass Your_Password \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=GitHub Actions, OU=CI, O=Cherrygram, L=GitHub, S=GitHub, C=US" \
            -noprompt

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Verify required Cherrygram sources
        shell: bash
        run: |
          missing=0
          required_files=(
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/Extra.kt"
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/camera/CameraXController.java"
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/camera/VideoMessagesHelper.java"
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/chats/filters/MessagesFilterHelper.kt"
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/chats/ui/MessageMenuCompactView.java"
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/chats/ui/MessageMenuHelper.java"
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/core/ui/folders/FoldersHelper.kt"
            "TMessagesProj/src/main/java/uz/unnarsx/cherrygram/preferences/tabs/MainTabsPreviewCell.java"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Missing required Cherrygram source file in checkout"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Cherrygram required source files are missing from the workflow checkout."
            echo "Make sure the stub/source compatibility files are committed together with .gitignore updates."
            exit 1
          fi

      - name: Build standalone APKs
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone -PskipTelegramPublish=true --stacktrace --info --console=plain --no-daemon 2>&1 | tee build-arm64-v8a-apk.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cherrygram-arm64-v8a-build-log
          path: build-arm64-v8a-apk.log
          if-no-files-found: warn

      - name: Upload Gradle problems report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cherrygram-gradle-problems-report
          path: build/reports/problems
          if-no-files-found: warn

      - name: List generated APKs
        if: always()
        shell: bash
        run: |
          echo "Checking APK outputs under build/outputs and legacy afat paths"
          find TMessagesProj_AppStandalone -type f \( -path "*/build/outputs/apk/*" -o -path "*/afat/standalone/*" \) -name "*.apk" -print | sort || true

      - name: Collect arm64-v8a APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact/apk

          mapfile -t apk_matches < <(
            find TMessagesProj_AppStandalone -type f \
              \( -path "*/build/outputs/apk/*" -o -path "*/afat/standalone/*" \) \
              -name "*arm64-v8a.apk" -print | sort
          )

          if [[ "${#apk_matches[@]}" -eq 0 ]]; then
            echo "::error::No arm64-v8a APK found in expected output directories."
            echo "Available APK files:"
            find TMessagesProj_AppStandalone -type f -name "*.apk" -print | sort || true
            exit 1
          fi

          printf 'Collected arm64-v8a APK candidates:\n'
          printf '%s\n' "${apk_matches[@]}"

          for apk in "${apk_matches[@]}"; do
            cp -f "$apk" artifact/apk/
          done

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: cherrygram-arm64-v8a-apk
          path: artifact/apk/*arm64-v8a.apk
          if-no-files-found: error
